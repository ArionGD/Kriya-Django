<!-- Kriya Dashboard Header Bar -->
<header class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 flex items-center sticky top-0 z-20 select-none shadow-sm overscroll-none transition-colors duration-300" style="overscroll-behavior: none;">
    
    <!-- Left: Logo & Brand container (aligned with sidebar width) -->
    <div id="header-logo-container"
         :class="sidebarCollapsed ? 'md:w-20 px-6 md:px-0 md:justify-center' : 'md:w-64 px-6 md:px-8 justify-start'" 
         class="h-full flex items-center transition-all duration-300 shrink-0 smooth-width">
        
        <!-- Burger Toggle for Mobile Sidebar -->
        <button @click="mobileSidebarOpen = !mobileSidebarOpen" class="md:hidden p-2 mr-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 transition-colors focus:outline-none" aria-label="Toggle Sidebar">
            <i data-lucide="menu" class="w-5 h-5" x-show="!mobileSidebarOpen"></i>
            <i data-lucide="x" class="w-5 h-5" x-show="mobileSidebarOpen" style="display: none;"></i>
        </button>

        <!-- Logo & Brand Link -->
        <a href="{% url 'core:home' %}" class="flex items-center gap-3 group">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-blue-600 to-sky-500 flex items-center justify-center shadow-md shadow-blue-600/10 shrink-0">
                <i data-lucide="orbit" class="w-5 h-5 text-white"></i>
            </div>
            <span id="header-logo-text" :class="sidebarCollapsed ? 'md:hidden' : 'md:block'" class="font-black text-xl tracking-wide text-blue-600 dark:text-blue-500">Kriya</span>
        </a>
    </div>

    <script>
        (function() {
            const collapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            const container = document.getElementById('header-logo-container');
            const logoText = document.getElementById('header-logo-text');
            if (collapsed) {
                container.classList.add('md:w-20', 'px-6', 'md:px-0', 'md:justify-center');
                logoText.classList.add('md:hidden');
            } else {
                container.classList.add('md:w-64', 'px-6', 'md:px-8', 'justify-start');
                logoText.classList.add('md:block');
            }
        })();
    </script>

    <!-- Separator -->
    <div class="w-px h-6 bg-slate-200 dark:bg-slate-800 hidden md:block shrink-0"></div>

    <!-- Right Content -->
    <div class="flex-1 h-full flex items-center justify-between px-6 md:px-10 gap-4">
        <!-- Console Title -->
        <div class="flex items-center gap-1.5 text-xs text-slate-400 dark:text-slate-500 font-bold uppercase tracking-wider">
            <span>Console</span>
            <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-slate-300 dark:text-slate-700"></i>
            <span class="text-slate-700 dark:text-slate-300">{% block header_title %}Overview{% endblock %}</span>
        </div>

        <!-- Right Side: User Profile & Actions -->
        <div class="flex items-center gap-4">
            <!-- Theme Toggle Button -->
            <div x-data="{ isDark: document.documentElement.classList.contains('dark') }"
                 @theme-changed.window="isDark = document.documentElement.classList.contains('dark')"
                 class="shrink-0 flex items-center">
                <button @click="toggleTheme()" 
                        class="flex h-9 w-9 items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 hover:scale-105 transition-all duration-200 focus:outline-none cursor-pointer"
                        title="Toggle Light/Dark Theme">
                    <i data-lucide="sun" class="w-4 h-4 text-amber-500" x-show="isDark" x-cloak></i>
                    <i data-lucide="moon" class="w-4 h-4" x-show="!isDark"></i>
                </button>
            </div>

            <!-- Role Badge -->
            <span class="bg-blue-50 dark:bg-blue-950/40 text-blue-700 dark:text-blue-400 text-xs px-2.5 py-1 rounded-full border border-blue-100 dark:border-blue-900/30 font-bold uppercase tracking-wider hidden sm:inline">
                {{ user.get_role_display }}
            </span>

            <div class="w-px h-6 bg-slate-200 dark:bg-slate-800"></div>

            <!-- Profile Info & Logout -->
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-600 to-sky-500 flex items-center justify-center text-white font-black text-sm shadow-sm">
                    {{ user.username|slice:":1"|upper }}
                </div>
                <div class="hidden md:block text-left">
                    <div class="text-xs font-semibold text-slate-800 dark:text-slate-200 leading-none">{{ user.username }}</div>
                    <div class="text-[10px] text-slate-400 dark:text-slate-500 mt-0.5 leading-none">{{ user.email }}</div>
                </div>

                <form action="{% url 'logout' %}" method="post" class="ml-2 inline">
                    {% csrf_token %}
                    <button type="submit" class="p-2 text-rose-500 hover:text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-950/20 rounded-xl transition-all flex items-center justify-center cursor-pointer" title="Sign Out">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</header>
