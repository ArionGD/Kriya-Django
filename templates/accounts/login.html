{% extends 'base.html' %}

{% block title %}Login — Kriya{% endblock %}

{% block content %}
<div class="max-w-md w-full mx-auto my-12 bg-white border border-slate-200 p-8 rounded-xl shadow-xl">
    <div class="text-center mb-6">
        <h2 class="text-3xl font-black text-slate-950">Welcome Back</h2>
        <p class="text-slate-500 text-sm mt-2">Log in to manage your worker deployments or requests</p>
    </div>

    <form method="post" class="space-y-6">
        {% csrf_token %}
        
        <div>
            <label for="id_username" class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
            <input type="text" name="username" id="id_username" required
                   class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 text-slate-900 placeholder-slate-400 focus:bg-white focus:outline-none focus:border-blue-500 transition shadow-sm">
        </div>

        <div>
            <label for="id_password" class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
            <input type="password" name="password" id="id_password" required
                   class="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 text-slate-900 placeholder-slate-400 focus:bg-white focus:outline-none focus:border-blue-500 transition shadow-sm">
        </div>

        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition shadow-md shadow-blue-600/10 cursor-pointer">
            Sign In
        </button>
    </form>

    <div class="mt-6 text-center text-sm text-slate-500">
        Don't have an account? 
        <a href="{% url 'register' %}" class="text-blue-600 font-semibold hover:underline">Register here</a>
    </div>
</div>
{% endblock %}
