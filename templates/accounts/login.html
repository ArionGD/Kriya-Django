{% extends 'base.html' %}

{% block title %}Login — KRIYA{% endblock %}

{% block content %}
<div class="max-w-md w-full mx-auto my-12 bg-slate-950 border border-slate-800 p-8 rounded-xl shadow-2xl">
    <div class="text-center mb-6">
        <h2 class="text-3xl font-black text-white">Welcome Back</h2>
        <p class="text-slate-400 text-sm mt-2">Log in to manage your worker deployments or requests</p>
    </div>

    <form method="post" class="space-y-6">
        {% csrf_token %}
        
        <div>
            <label for="id_username" class="block text-sm font-semibold text-slate-300 mb-2">Username</label>
            <input type="text" name="username" id="id_username" required
                   class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-emerald-500 transition">
        </div>

        <div>
            <label for="id_password" class="block text-sm font-semibold text-slate-300 mb-2">Password</label>
            <input type="password" name="password" id="id_password" required
                   class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-emerald-500 transition">
        </div>

        <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-3 rounded-lg transition shadow-lg shadow-emerald-500/10">
            Sign In
        </button>
    </form>

    <div class="mt-6 text-center text-sm text-slate-500">
        Don't have an account? 
        <a href="{% url 'register' %}" class="text-emerald-400 hover:underline">Register here</a>
    </div>
</div>
{% endblock %}
