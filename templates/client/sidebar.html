<!-- Client Left Sidebar -->
<aside :class="[
           mobileSidebarOpen ? 'translate-x-0' : '-translate-x-full',
           sidebarCollapsed ? 'md:w-20' : 'md:w-64'
       ]"
       class="fixed top-16 left-0 h-[calc(100vh-4rem)] bg-white border-r border-slate-200 flex flex-col shrink-0 z-30 md:z-10 transition-all duration-300 md:translate-x-0 smooth-width overscroll-none" style="overscroll-behavior: none;">

    <div class="flex-1 flex flex-col justify-between py-4 overflow-y-auto overscroll-none" style="overscroll-behavior: none;">
        <nav class="space-y-1.5 px-4">
            <div x-show="!sidebarCollapsed" class="px-4 py-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                Employer Hub
            </div>
            <div x-show="sidebarCollapsed" class="w-full border-t border-slate-200 my-2"></div>

            <!-- Dashboard Link -->
            <a href="{% url 'client:dashboard' %}" 
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all group {% if request.resolver_match.url_name == 'dashboard' %}bg-blue-50 border border-blue-100 text-blue-700{% else %}text-slate-600 hover:text-slate-900 hover:bg-slate-50{% endif %}"
               :class="sidebarCollapsed ? 'justify-center px-2' : 'justify-start px-4'"
               title="Client Console">
                <i data-lucide="layout-dashboard" class="w-5 h-5 shrink-0 {% if request.resolver_match.url_name == 'dashboard' %}text-blue-600{% else %}text-slate-400 group-hover:text-blue-600{% endif %}"></i>
                <span x-show="!sidebarCollapsed">Console</span>
            </a>

            <!-- Post Requirement -->
            <a href="{% url 'client:post_requirement' %}" 
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all group {% if request.resolver_match.url_name == 'post_requirement' %}bg-blue-50 border border-blue-100 text-blue-700{% else %}text-slate-600 hover:text-slate-900 hover:bg-slate-50{% endif %}"
               :class="sidebarCollapsed ? 'justify-center px-2' : 'justify-start px-4'"
               title="Post Requirement">
                <i data-lucide="file-plus-2" class="w-5 h-5 shrink-0 {% if request.resolver_match.url_name == 'post_requirement' %}text-blue-600{% else %}text-slate-400 group-hover:text-blue-600{% endif %}"></i>
                <span x-show="!sidebarCollapsed">Post Requirement</span>
            </a>

            <!-- Active Placements -->
            <a href="{% url 'client:active_staff' %}" 
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all group {% if request.resolver_match.url_name == 'active_staff' %}bg-blue-50 border border-blue-100 text-blue-700{% else %}text-slate-600 hover:text-slate-900 hover:bg-slate-50{% endif %}"
               :class="sidebarCollapsed ? 'justify-center px-2' : 'justify-start px-4'"
               title="Active Staff">
                <i data-lucide="briefcase" class="w-5 h-5 shrink-0 {% if request.resolver_match.url_name == 'active_staff' %}text-blue-600{% else %}text-slate-400 group-hover:text-blue-600{% endif %}"></i>
                <span x-show="!sidebarCollapsed">Active Staff</span>
            </a>

            <!-- Settings -->
            <a href="{% url 'client:settings' %}" 
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all group {% if request.resolver_match.url_name == 'settings' %}bg-blue-50 border border-blue-100 text-blue-700{% else %}text-slate-600 hover:text-slate-900 hover:bg-slate-50{% endif %}"
               :class="sidebarCollapsed ? 'justify-center px-2' : 'justify-start px-4'"
               title="Settings">
                <i data-lucide="settings" class="w-5 h-5 shrink-0 {% if request.resolver_match.url_name == 'settings' %}text-blue-600{% else %}text-slate-400 group-hover:text-blue-600{% endif %}"></i>
                <span x-show="!sidebarCollapsed">Settings</span>
            </a>
        </nav>

        <!-- Sidebar Footer Toggle -->
        <div class="px-4 mt-auto pt-4 border-t border-slate-100">
            <button type="button" 
                    @click="sidebarCollapsed = !sidebarCollapsed; localStorage.setItem('sidebarCollapsed', sidebarCollapsed)"
                    class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-700 hover:bg-slate-50 transition-all"
                    :class="sidebarCollapsed ? 'justify-center px-2' : 'justify-start px-4'"
                    title="Collapse Menu">
                <i x-show="!sidebarCollapsed" data-lucide="chevron-left" class="w-5 h-5 shrink-0"></i>
                <i x-show="sidebarCollapsed" data-lucide="chevron-right" class="w-5 h-5 shrink-0" style="display: none;"></i>
                <span x-show="!sidebarCollapsed">Collapse Menu</span>
            </button>
        </div>
    </div>
</aside>
